<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퍼스널 재테크</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+KR:wght@200;300;400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .intro-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        /* 배경 이미지 */
        .bg-image {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            z-index: 0;
            background-image: url('https://images.unsplash.com/photo-1642790106117-e829e14a795f?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            filter: brightness(0.3) saturate(0.7);
            animation: slowDrift 25s ease-in-out infinite alternate;
        }

        @keyframes slowDrift {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(1.5%, -1%) scale(1.03); }
            50% { transform: translate(-1%, 1.5%) scale(1.05); }
            75% { transform: translate(1%, 0.5%) scale(1.02); }
            100% { transform: translate(-0.5%, -1.5%) scale(1.04); }
        }

        /* 오버레이 */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background:
                radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%),
                linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.5) 100%);
        }

        /* 메인 콘텐츠 */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .title {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 2.2rem;
            font-weight: 300;
            color: #fff;
            letter-spacing: 0.12em;
            margin-bottom: 14px;
            opacity: 0;
            animation: fadeInUp 1.4s ease forwards;
            animation-delay: 0.3s;
        }

        .subtitle {
            font-size: 0.78rem;
            font-weight: 200;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.2em;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeInUp 1.4s ease forwards;
            animation-delay: 0.8s;
        }

        .go-in-btn {
            display: inline-block;
            padding: 13px 70px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            transition: all 0.5s ease;
            opacity: 0;
            animation: fadeInUp 1.4s ease forwards;
            animation-delay: 1.3s;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(6px);
        }

        .go-in-btn:hover {
            background: rgba(140, 198, 63, 0.12);
            border-color: rgba(140, 198, 63, 0.5);
            color: #8cc63f;
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(140, 198, 63, 0.1);
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 하단 스크롤 힌트 */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            opacity: 0;
            animation: fadeInUp 1.4s ease forwards, floatUpDown 2.5s ease-in-out infinite;
            animation-delay: 2s, 3.4s;
        }

        .scroll-hint span {
            display: block;
            width: 1px;
            height: 30px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
            margin: 0 auto;
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* 모바일 */
        @media (max-width: 768px) {
            .title {
                font-size: 1.6rem;
            }
            .subtitle {
                font-size: 0.68rem;
                padding: 0 30px;
            }
            .go-in-btn {
                padding: 12px 55px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="intro-container">
        <div class="bg-image"></div>
        <div class="bg-overlay"></div>
        <div class="content">
            <h1 class="title">퍼스널 재테크</h1>
            <p class="subtitle">현명한 돈관리부터 재테크, 내 집 마련까지</p>
            <a href="home.html" class="go-in-btn">go in</a>
        </div>
        <div class="scroll-hint">
            <span></span>
        </div>
    </div>
</body>
</html>
